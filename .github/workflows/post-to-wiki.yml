name: Sync README to Wiki

on:
  push:
    branches:
      - master 
      - main
    paths:
      - 'README.md'

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync README to Wiki
        uses: Andrew-Chen-Wang/github-wiki-action@v4
        with:
          strategy: clone
          wiki_folder: .
          files: |
            README.md:Home.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}